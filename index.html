<body>

  <div class="lt">OFS Training Command Board</div>

</div>

<!-- SLIDE 2 -->

    <div><div class="ht">Internal Training — Student Country of Origin</div><div class="hs">Where this week's students are coming from</div></div>

<script>
// ── RENDER FUNCTIONS ─────────────────────────────────────────────────────────

function ragIcon(rag){return rag==='green'?'✓':rag==='red'?'✗':'!';}

function renderSlide1(D){
  const s1=D.slide1,ap=D.actionPlans,cx=D.capex;
  const safetyClass=s1.safetyRag||'green';
  const rags=s1.overallRAGs;

  // build KPI rows
  const kpiKeys=['ptsi','timecard','instUtil'];
  let kpiRows='';
  for(const k of kpiKeys){
    const kpi=s1.kpis[k];
    const badgeBg=kpi.ytdRag==='green'?'#2D7A45':kpi.ytdRag==='red'?'#C0392B':'#E67E22';
    const mTag=`<span class="kpi-tag ${kpi.monthRag}">${kpi.monthLabel}: ${kpi.monthValue}%</span>`;
    const reverse=kpi.reverse?`<span class="kpi-tag gry">Reverse ≤${kpi.plan}%</span>`:`<span class="kpi-tag gry">Plan: ${kpi.plan}%</span>`;
    kpiRows+=`<div class="kpi-row">
      <div class="kpi-badge" style="background:${badgeBg};color:white">${kpi.ytdValue}%</div>

function getBarClass(pct,over){
  if(over)return'over';
  if(pct>=80)return'full';
  if(pct>=50)return'mid';
  return'low';
}

// ── SLIDE CONTROLLER ─────────────────────────────────────────────────────────
const SLIDES=[{id:"s1",dur:30000},{id:"s2",dur:30000},{id:"s3",dur:35000},{id:"s4",dur:35000}];
let cur=0,timer=null;
const pb=document.getElementById("pb");
const sc=document.getElementById("sc");

function showSlide(i){
  SLIDES.forEach((s,j)=>{
    const el=document.getElementById(s.id);
    if(el)el.classList.toggle("active",j===i);
  });
  cur=i;sc.textContent=(i+1)+"/"+SLIDES.length;
  startProgress(SLIDES[i].dur);
}

function startProgress(ms){
  clearInterval(timer);
  pb.style.transition="none";pb.style.width="0%";
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{
    pb.style.transition="width "+ms+"ms linear";pb.style.width="100%";
  });});
  timer=setInterval(()=>{showSlide((cur+1)%SLIDES.length);},ms);
}

// ── INTERACTION PAUSE ─────────────────────────────────────────────────────────
// Mouse movement / mouse click / keypress pauses the auto-cycle; it auto-resumes
// from the CURRENT slide after 60s of inactivity. Touch input is intentionally
// ignored (pointerType !== "mouse"), so Clevertouch kiosk behavior is unchanged.
let idleTimer=null,paused=false;
const IDLE_MS=60000;
function pauseCycle(){
  if(!paused){
    paused=true;
    clearInterval(timer);
    const w=getComputedStyle(pb).width;        // freeze progress bar where it is
    pb.style.transition="none";pb.style.width=w;
  }
  clearTimeout(idleTimer);
  idleTimer=setTimeout(()=>{paused=false;showSlide(cur);},IDLE_MS);
}
window.addEventListener("pointermove",e=>{if(e.pointerType==="mouse")pauseCycle();});
window.addEventListener("pointerdown",e=>{if(e.pointerType==="mouse")pauseCycle();});
window.addEventListener("keydown",pauseCycle);

// ── MAP FUNCTIONS (unchanged) ─────────────────────────────────────────────────
async function loadWorld(){
  if(window._wld)return window._wld;
  const r=await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json");
  window._wld=await r.json();return window._wld;
}

function buildMap(cid,pins,opts){
  const ct=document.getElementById(cid);if(!ct)return;
  const W=ct.clientWidth||1400,H=ct.clientHeight||520;
  d3.select(ct).selectAll("*").remove();
  const svg=d3.select(ct).append("svg").attr("width",W).attr("height",H);
  svg.append("rect").attr("width",W).attr("height",H).attr("fill","#E6F2F2");
  const proj=d3.geoNaturalEarth1().scale(W/6.1).translate([W/2,H/2]);
  const path=d3.geoPath().projection(proj);
  svg.append("path").datum(d3.geoGraticule()()).attr("d",path).attr("fill","none").attr("stroke","rgba(0,94,96,.1)").attr("stroke-width",.5);
  const cntrs=topojson.feature(window._wld,window._wld.objects.countries);
  svg.selectAll(".c").data(cntrs.features).enter().append("path").attr("class","c").attr("d",path).attr("fill","#C5DFE0").attr("stroke","white").attr("stroke-width",.5);
  const allC=(pins.week||pins.origin||[]).map(p=>p.count||p.students||0).filter(n=>n>0);
  const rS=d3.scaleSqrt().domain([0,Math.max(...allC,1)]).range([0,opts.maxR||45]);
  const pArr=pins.week||pins.origin||[];
  const pG=svg.append("g");
  for(const p of pArr){
    const c=proj([p.lon,p.lat]);if(!c)continue;
    const cnt=p.count||p.students||0;
    const r=Math.max(18,rS(cnt));
    const wk=!!pins.week;
    pG.append("circle").attr("cx",c[0]).attr("cy",c[1]).attr("r",r).attr("fill",wk?"rgba(200,255,8,.88)":"rgba(0,94,96,.78)").attr("stroke","white").attr("stroke-width",2);
    pG.append("text").attr("x",c[0]).attr("y",c[1]).attr("text-anchor","middle").attr("dominant-baseline","central").attr("font-family","'Sons Condensed Extrabold',Inter,'Segoe UI',Arial,sans-serif").attr("font-weight","900").attr("font-size",r>26?14:r>19?11:9).attr("fill",wk?"#005E60":"#C8FF08").text(cnt);
    pG.append("text").attr("x",c[0]).attr("y",c[1]+r+9).attr("text-anchor","middle").attr("font-family","Inter,'Segoe UI',Arial,sans-serif").attr("font-size",8).attr("fill","#212121").attr("font-weight","600").text(p.country);
  }
  if(pins.lcs){
    const lG=svg.append("g");
    for(const lc of pins.lcs){
      const c=proj([lc.lon,lc.lat]);if(!c)continue;
      const r2=lc.students>0?Math.max(10,rS(lc.students)*.4):7;
      lG.append("circle").attr("cx",c[0]).attr("cy",c[1]).attr("r",r2+4).attr("fill","none").attr("stroke","#C8FF08").attr("stroke-width",2.5).attr("stroke-dasharray","4,2");
      lG.append("text").attr("x",c[0]).attr("y",c[1]-r2-10).attr("text-anchor","middle").attr("font-family","'Sons Condensed Extrabold',Inter,'Segoe UI',Arial,sans-serif").attr("font-weight","900").attr("font-size",10).attr("fill","#005E60").text(lc.name.split("—")[0].trim());
    }
  }
  const leg=d3.select(ct).append("div").style("position","absolute").style("bottom","18px").style("left","14px").style("display","flex").style("gap","14px").style("background","rgba(0,94,96,.88)").style("padding","6px 14px").style("border-radius","6px");
  if(opts.li){
    for(const li of opts.li){
      const it=leg.append("div").style("display","flex").style("align-items","center").style("gap","5px");
      it.append("div").style("width","10px").style("height","10px").style("border-radius","50%").style("background",li.c);
      it.append("div").style("font-size","9px").style("color","rgba(255,255,255,.85)").text(li.l);
    }
  }
}

async function initMaps(DATA){
  await loadWorld();
  document.getElementById('s3-hw').textContent=`${DATA.slide3.totalCountries} Countries · ${DATA.slide3.totalStudents} Students`;
  document.getElementById('s4-hw').textContent=`${DATA.slide4.weekStudents} Students · ${DATA.slide4.weekClasses} Classes This Week`;
  const s3=document.getElementById("map3-container");
  if(s3)buildMap("map3-container",{origin:DATA.slide3.pins,lcs:DATA.slide3.learningCenters},{maxR:50,li:[{c:"rgba(0,94,96,.78)",l:"Student Origin — bubble = student count"},{c:"#C8FF08",l:"Learning Center"}]});
  const s4=document.getElementById("map4-container");
  if(s4)buildMap("map4-container",{week:DATA.slide4.weekDelivery},{maxR:55,li:[{c:"rgba(200,255,8,.88)",l:"This Week — customer training delivery locations"}]});
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  try {
    const resp = await fetch('board-data.json?v=' + Date.now());
    if (!resp.ok) throw new Error('board-data.json not found');
    const DATA = await resp.json();
    renderSlide1(DATA);
    renderSlide2(DATA);
    document.getElementById('loading').style.display = 'none';
    showSlide(0);
    await initMaps(DATA);
    [["s3","map3-container"],["s4","map4-container"]].forEach(([sid])=>{
      const obs=new MutationObserver(()=>{
        if(document.getElementById(sid).classList.contains("active"))initMaps(DATA);
      });
      obs.observe(document.getElementById(sid),{attributes:true,attributeFilter:["class"]});
    });
  } catch(err) {
    document.getElementById('loading').innerHTML =
      '<div class="lt" style="color:#F87171">Board Data Error</div>' +
      '<div class="ls">' + err.message + '</div>' +
      '<div class="ls" style="margin-top:8px;opacity:.6">Upload board-data.json to the repository</div>';
  }
});
